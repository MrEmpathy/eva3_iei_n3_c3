<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>

    <link rel="stylesheet" href="./css/estilos.css">
    <link rel="stylesheet" href="./css/brite.css">
    <link rel="shortcut icon" href="./assets/images/medal_1178777.png" type="image/x-icon">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="./scripts/formulario.js"></script>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sistema Gestión de Libros</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="./inicio.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./formulario.html">Registro Usuarios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./libros.html">Registro Libros</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="contenedor_principal container">
        <form id="formularioRegistro">
            <p class="h1">Formulario de Registro de Usuario</p>
            <hr>

            <p class="h3">Datos Personales</p>
            <div class="row">
                <div class="col">
                    <label class="form-label" for="inputNombre">Nombre Completo: <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" id="inputNombre" onchange="validarInput($(this))">
                </div>
                <div class="col">
                    <label class="form-label" for="inputRut">RUT: <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" id="inputRut" placeholder="12.345.678-9" onchange="validarRutInput($(this))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label class="form-label" for="inputCorreo">Correo Electrónico: <span class="text-danger">*</span></label>
                    <input class="form-control" type="email" id="inputCorreo" onchange="validarEmail($(this))">
                </div>
                <div class="col">
                    <label class="form-label" for="inputTelefono">Teléfono:</label>
                    <input class="form-control" type="text" id="inputTelefono" placeholder="+56 9 1234 5678">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label for="inputFechaNac" class="form-label">Fecha de Nacimiento:</label>
                    <input type="date" id="inputFechaNac" class="form-control" onchange="validarFechaPasada($(this))">
                </div>
                <div class="col">
                    <label for="selectNacionalidad" class="form-label">Nacionalidad (ISO): <span class="text-danger">*</span></label>
                    <select class="form-select" id="selectNacionalidad" onchange="validarInput($(this))">
                        <option value="" selected>Seleccione su país de origen</option>
                    </select>
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label class="form-label" for="inputContrasena">Contraseña: <span class="text-danger">*</span></label>
                    <input class="form-control" type="password" id="inputContrasena" onchange="validarContrasena($(this))">
                    <div class="form-text">Mínimo 8 caracteres: mayúscula, minúscula, número y carácter especial.</div>
                </div>
                <div class="col">
                    <label class="form-label" for="inputRepetirContrasena">Repetir Contraseña: <span class="text-danger">*</span></label>
                    <input class="form-control" type="password" id="inputRepetirContrasena"
                        onchange="validarRepetirContrasena($(this), $('#inputContrasena'))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <p class="mb-1">Género:</p>
                    <div class="form-check form-check-inline">
                        <input type="radio" class="form-check-input" name="genero" id="radioMasc" value="M">
                        <label class="form-check-label" for="radioMasc">Masculino</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" class="form-check-input" name="genero" id="radioFem" value="F">
                        <label class="form-check-label" for="radioFem">Femenino</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" class="form-check-input" name="genero" id="radioOtro" value="O">
                        <label class="form-check-label" for="radioOtro">Otro</label>
                    </div>
                </div>
            </div>
            <hr>

            <p class="h3">Dirección</p>
            <div class="row">
                <div class="col">
                    <label class="form-label" for="selectComuna">Comuna: <span class="text-danger">*</span></label>
                    <select id="selectComuna" class="form-select" onchange="validarInput($(this))">
                        <option value="" selected>Seleccione su comuna</option>
                    </select>
                </div>
                <div class="col">
                    <label class="form-label" for="inputCalle">Calle: <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" id="inputCalle" onchange="validarInput($(this))">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col">
                    <label class="form-label" for="inputNumero">Número: <span class="text-danger">*</span></label>
                    <input class="form-control" type="text" id="inputNumero" onchange="validarInput($(this))">
                </div>
                <div class="col">
                    <label class="form-label" for="inputDepartamento">Departamento / Oficina:</label>
                    <input class="form-control" type="text" id="inputDepartamento">
                </div>
            </div>
            <br>

            <div class="row">
                <div class="col d-flex justify-content-end">
                    <button type="button" class="btn btn-secondary me-2"
                        onclick="window.location.href='./inicio.html'">Cancelar</button>
                    <button type="button" id="btnSubmit" class="btn btn-primary" onclick="validarFormulario()">Registrar Usuario</button>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
